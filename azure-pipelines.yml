trigger:
- master   # change if needed

pool:
  vmImage: 'ubuntu-latest'

steps:
# ✅ Step 1: Build Docker image
- task: Docker@2
  displayName: Build Docker image
  inputs:
    containerRegistry: 'docker-connection'
    repository: 'vyshnav123456789/vyshnav'
    command: 'build'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)

# ✅ Step 2: Push Docker image
- task: Docker@2
  displayName: Push Docker image
  inputs:
    containerRegistry: 'docker-connection'
    repository: 'vyshnav123456789/vyshnav'
    command: 'push'
    tags: |
      $(Build.BuildId)

# ✅ ✅ Step 3: Create artifact file (IMPORTANT)
- script: |
    echo "IMAGE_NAME=vyshnav123456789/vyshnav:$(Build.BuildId)" > image.txt
  displayName: Create image metadata

# ✅ ✅ Step 4: Publish artifact
- task: PublishBuildArtifacts@1
  displayName: Publish Artifact
  inputs:
    PathtoPublish: 'image.txt'
    ArtifactName: 'drop'
    publishLocation: 'Container'

