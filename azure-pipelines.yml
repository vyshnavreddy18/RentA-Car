trigger:
- master   # change to 'main' if your branch is main

pool:
  vmImage: 'ubuntu-latest'

steps:
# Build the Docker image
- task: Docker@2
  displayName: Build Docker image
  inputs:
    containerRegistry: 'docker-connection'   # Docker Hub service connection
    repository: 'vyshnav123456789/vyshnav'   # your Docker Hub repo
    command: 'build'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)

# Push the image to Docker Hub
- task: Docker@2
  displayName: Push Docker image
  inputs:
    containerRegistry: 'docker-connection'
    repository: 'vyshnav123456789/vyshnav'
    command: 'push'
    tags: |
      $(Build.BuildId)

# Deploy to Azure Web App for Containers
- task: AzureWebApp@1
  displayName: Deploy to Azure Web App
  inputs:
    azureSubscription: 'azure-resource'      # ARM service connection
    appName: 'webapp-connection'             # your App Service name
    imageName: 'vyshnav123456789/vyshnav:$(Build.BuildId)'
